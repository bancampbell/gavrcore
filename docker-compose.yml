services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gavrcore_app
    restart: unless-stopped
    volumes:
      - ./src:/var/www
    networks:
      - gavrcore-network
    depends_on:
      database:
        condition: service_healthy

  webserver:
    image: nginx:1.25
    container_name: gavrcore_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - gavrcore-network

  database:
    image: postgres:15
    container_name: gavrcore_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - gavrcore-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  gavrcore-network:
    driver: bridge